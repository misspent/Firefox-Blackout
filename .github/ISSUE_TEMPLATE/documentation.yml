name: Documentation
description: Improvements or additions to documentation
title: "📝: "
assignees: misspent
labels: [documentation]
body:
  - type: checkboxes
    id: check
    attributes:
      label: "🔍 Did you check former documentations?"
      description: "Please make sure this hasn't been requested before. I will close this issue if it's a duplicate."
      options:
      - label: "I have checked and can't find anything to do with it"
        required: true
  - type: textarea
    id: plugin-feature
    attributes:
      label: "❓ What is it, why do you want it, etc"
      description: "Make sure you're direct with what you want with as much information as possible."
